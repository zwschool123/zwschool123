<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Index of /</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    a { text-decoration: none; }
    li { margin: 3px 0; }
  </style>
</head>
<body>

<h1>Index of /</h1>
<p id="pathDisplay">/</p>
<ul id="fileList">Loading...</ul>

<script>
const username = "zwschool123"; // replace with your GitHub username
const repo = "zwschool123";         // replace with your GitHub repo name
let currentPath = "";
let historyStack = [];

async function loadFiles(path = "") {
  const list = document.getElementById("fileList");
  const pathDisplay = document.getElementById("pathDisplay");

  pathDisplay.textContent = "/" + path;
  list.innerHTML = "Loading...";

  try {
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`);
    if (!res.ok) throw new Error("API request failed");
    const data = await res.json();
    if (!Array.isArray(data)) {
      list.innerHTML = "<li>(empty folder)</li>";
      return;
    }

    list.innerHTML = "";

    // Add ".." to go up
    if (historyStack.length > 0) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#";
      a.textContent = "..";
      a.onclick = () => {
        currentPath = historyStack.pop();
        loadFiles(currentPath);
      };
      li.appendChild(a);
      list.appendChild(li);
    }

    data.forEach(item => {
      const li = document.createElement("li");
      const a = document.createElement("a");

      if (item.type === "dir") {
        a.textContent = item.name + "/";
        a.href = "#";
        a.onclick = () => {
          historyStack.push(currentPath);
          currentPath = item.path;
          loadFiles(currentPath);
        };
      } else {
        a.textContent = item.name;
        a.href = item.download_url; // safe link, works with spaces
        a.target = "_blank";
      }

      li.appendChild(a);
      list.appendChild(li);
    });

    if (list.innerHTML === "") list.innerHTML = "<li>(empty folder)</li>";

  } catch (err) {
    list.innerHTML = "<li>Error loading files</li>";
    console.error(err);
  }
}

// Initial load
loadFiles();
</script>

</body>
</html>
