<!DOCTYPE html>
<html>
<head>
  <title>File Directory</title>
  <style>
    body { font-family: Arial; }
    a { text-decoration: none; }
    li { margin: 5px 0; }
    .folder { font-weight: bold; }
  </style>
</head>
<body>

<h1>File Directory</h1>
<p id="pathDisplay">/</p>
<button onclick="goBack()">⬅ Back</button>

<ul id="fileList">Loading...</ul>

<script>
const username = "zwschool123";
const repo = "zwschool123";

let currentPath = "";
let historyStack = [];

async function loadFiles(path = "") {
  const list = document.getElementById("fileList");
  const pathDisplay = document.getElementById("pathDisplay");

  list.innerHTML = "Loading...";
  pathDisplay.textContent = "/" + path;

  try {
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`);
    const data = await res.json();

    list.innerHTML = "";

    data.forEach(item => {
      const li = document.createElement("li");
      const a = document.createElement("a");

      if (item.type === "dir") {
        a.textContent = "Folder: " + item.name;
        a.href = "#";
        a.className = "folder";

        a.onclick = () => {
          historyStack.push(currentPath);
          currentPath = item.path;
          loadFiles(currentPath);
        };
      } else if (item.name.endsWith(".txt")) {
        a.textContent = "Document: " + item.name;
        a.href = `https://${username}.github.io/${repo}/${item.path}`;
        a.target = "_blank";
      } else {
        return; // ignore non-txt files
      }

      li.appendChild(a);
      list.appendChild(li);
    });

    if (list.innerHTML === "") {
      list.innerHTML = "<li>NThis folder is empty.</li>";
    }

  } catch (err) {
    list.innerHTML = "<li>Error loading files. Is your file directory mounted to /root?</li>";
    console.error(err);
  }
}

function goBack() {
  if (historyStack.length > 0) {
    currentPath = historyStack.pop();
    loadFiles(currentPath);
  }
}

loadFiles();
</script>

</body>
</html>
