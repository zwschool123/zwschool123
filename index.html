<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Index of /root</title>
<style>
body { font-family:"Times New Roman", Times, serif; padding:20px; }
table { width:100%; border-collapse:collapse; }
th, td { text-align:left; padding:4px; font-size:14px; }
th { border-bottom:1px solid #aaa; }
a { text-decoration:none; color:blue; }
a:hover { text-decoration:underline; cursor:pointer; }
#loginBox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; }
#loginBox div { background:white; padding:20px; border-radius:8px; text-align:center; }
</style>
</head>
<body>

<div id="loginBox">
  <div>
    <h2>Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Password"><br><br>
    <button onclick="checkPassword()">Login</button>
    <p id="errorMsg" style="color:red;"></p>
  </div>
</div>

<h1>Index of /root</h1>
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Last modified</th>
  <th>Size</th>
  <th>Description</th>
</tr>
</thead>
<tbody id="fileList">
<tr><td colspan="4">Loading...</td></tr>
</tbody>
</table>

<script>
// --- Config ---
const username = "zwschool123";
const repo = "zwschool123";
const correctHash = "3ee0c5fb019d6cacddf5d29df7fa1d79b9be4eb1bf27efabe74ed69d337bd235";

let currentPath = "root"; // Start at /root
let historyStack = [];

// SHA-256 password check
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  const hash = await sha256(input);
  if(hash === correctHash){
    document.getElementById("loginBox").style.display = "none";
    loadFiles(currentPath);
  } else {
    document.getElementById("errorMsg").textContent = "Incorrect password";
  }
}

// --- Helpers ---
function formatSize(bytes){
  if(bytes===0) return "-";
  if(bytes<1024) return bytes+"B";
  if(bytes<1024*1024) return (bytes/1024).toFixed(1)+"K";
  return (bytes/(1024*1024)).toFixed(1)+"M";
}

async function getLastModified(path){
  try{
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/commits?path=${path}&per_page=1`);
    const data = await res.json();
    if(data && data[0] && data[0].commit) return new Date(data[0].commit.committer.date).toLocaleString();
  }catch(e){}
  return "-";
}

// --- Load files ---
async function loadFiles(path){
  const tbody = document.getElementById("fileList");
  tbody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  try{
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`);
    if(!res.ok) throw new Error("Failed to fetch folder");
    const data = await res.json();
    if(!Array.isArray(data)) { tbody.innerHTML = "<tr><td colspan='4'>(empty folder)</td></tr>"; return; }

    tbody.innerHTML = "";

    // Parent directory
    if(historyStack.length > 0){
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.colSpan = 4;
      const link = document.createElement("a");
      link.textContent = "Parent Directory";
      link.addEventListener("click", goBack);
      td.appendChild(link);
      tr.appendChild(td);
      tbody.appendChild(tr);
    }

    // Sort dirs first
    data.sort((a,b)=>{
      if(a.type===b.type) return a.name.localeCompare(b.name);
      return a.type==='dir'?-1:1;
    });

    for(const item of data){
      if(item.name.toLowerCase() === "index.html") continue;

      const tr = document.createElement("tr");

      // Name
      const nameCell = document.createElement("td");
      const link = document.createElement("a");
      link.textContent = item.type==='dir' ? item.name+'/' : item.name;
      if(item.type==='dir'){
        link.addEventListener("click", ()=>{
          historyStack.push(currentPath);
          currentPath = item.path;
          loadFiles(currentPath);
        });
      } else {
        link.href = item.download_url;
        link.target = "_blank";
      }
      nameCell.appendChild(link);
      tr.appendChild(nameCell);

      // Last modified
      const lastCell = document.createElement("td");
      lastCell.textContent = "-";
      tr.appendChild(lastCell);

      // Size
      const sizeCell = document.createElement("td");
      sizeCell.textContent = item.type==='file' ? formatSize(item.size) : "-";
      tr.appendChild(sizeCell);

      // Description
      const descCell = document.createElement("td");
      tr.appendChild(descCell);

      tbody.appendChild(tr);

      if(item.type==='file') getLastModified(item.path).then(d=>lastCell.textContent=d);
    }

    if(tbody.innerHTML==="") tbody.innerHTML="<tr><td colspan='4'>(empty folder)</td></tr>";

  }catch(err){
    tbody.innerHTML="<tr><td colspan='4'>Error loading files</td></tr>";
    console.error(err);
  }
}

// --- Navigation ---
function goBack(){
  if(historyStack.length>0){
    currentPath = historyStack.pop();
    loadFiles(currentPath);
  }
}
</script>

</body>
</html>
