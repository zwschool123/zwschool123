<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Index of /root</title>
<style>
body {
  font-family: "Times New Roman", Times, serif;
  padding: 20px;
}
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 4px; font-size: 14px; }
th { border-bottom: 1px solid #aaa; }
a { text-decoration: none; color: blue; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Index of /root</h1>
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Last modified</th>
  <th>Size</th>
  <th>Description</th>
</tr>
</thead>
<tbody id="fileList">
<tr><td colspan="4">Loading...</td></tr>
</tbody>
</table>

<script>
const username = "YOUR_USERNAME"; // replace
const repo = "YOUR_REPO";         // replace
let currentPath = "";
let historyStack = [];

// Helper for formatting file size
function formatSize(bytes) {
  if (bytes === 0) return "-";
  if (bytes < 1024) return bytes + "B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + "K";
  return (bytes/(1024*1024)).toFixed(1) + "M";
}

// Fetch last commit date for a file/folder
async function getLastModified(path) {
  try {
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/commits?path=${path}&per_page=1`);
    const data = await res.json();
    if (data && data[0] && data[0].commit) {
      return new Date(data[0].commit.committer.date).toLocaleString();
    }
  } catch(e) {}
  return "-";
}

async function loadFiles(path="") {
  const tbody = document.getElementById("fileList");
  tbody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  try {
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`);
    if (!res.ok) throw new Error("API request failed");
    const data = await res.json();
    if (!Array.isArray(data)) { tbody.innerHTML = "<tr><td colspan='4'>(empty folder)</td></tr>"; return; }

    tbody.innerHTML = "";

    // Parent directory
    if (historyStack.length > 0) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td><a href="#" onclick="goBack()">Parent Directory</a></td><td>-</td><td>-</td><td></td>`;
      tbody.appendChild(tr);
    }

    // Sort dirs first
    data.sort((a,b)=>{
      if(a.type===b.type) return a.name.localeCompare(b.name);
      return a.type==='dir'?-1:1;
    });

    for (const item of data) {
      if(item.name.toLowerCase() === "index.html") continue; // hide index.html
      const tr = document.createElement("tr");
      const name = item.type==='dir' ? item.name+'/' : item.name;
      const href = item.type==='dir' ? "#" : item.download_url;
      const onclick = item.type==='dir' ? `loadDir("${item.path}")` : "";

      // Get last modified date
      const lastMod = await getLastModified(item.path);

      const size = item.type==='file' ? formatSize(item.size) : "-";

      tr.innerHTML = `
        <td><a href="${href}" ${onclick ? 'onclick="'+onclick+'"' : ''} target="${item.type==='file'?'_blank':''}">${name}</a></td>
        <td>${lastMod}</td>
        <td>${size}</td>
        <td></td>
      `;
      tbody.appendChild(tr);
    }

    if (tbody.innerHTML === "") tbody.innerHTML = "<tr><td colspan='4'>(empty folder)</td></tr>";

  } catch(err) {
    tbody.innerHTML = "<tr><td colspan='4'>Error loading files</td></tr>";
    console.error(err);
  }
}

function loadDir(path) {
  historyStack.push(currentPath);
  currentPath = path;
  loadFiles(currentPath);
}

function goBack() {
  if(historyStack.length>0){
    currentPath = historyStack.pop();
    loadFiles(currentPath);
  }
}

// Initial load
loadFiles();
</script>

</body>
</html>
